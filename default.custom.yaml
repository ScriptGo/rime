patch:

# 方案列表
  schema_list:
    - schema: flypy

# 候选菜单
  menu:
    page_size: 9                     # 候选项个数
    # alternative_select_keys: "';"  # 空格或引号选第1项候选项，分号选选第2项候选项
    page_down_cycle: true            # 首尾衔接，轮回翻页
    alternative_select_labels: [ ①, ②, ③, ④, ⑤, ⑥, ⑦, ⑧, ⑨ ]  # 修改候选词标签

# 方案切换(就一种方案，不用切换)
  switcher:
    abbreviate_options: true
    caption: 〔方案切换〕
    fold_options: true
    hotkeys:
      - "Control+grave"

  ascii_composer:
    good_old_caps_lock: true # 设置Caps键仅切换大小写

# 打字打到一半时按下了 Caps 或 Shift 后
# inline_ascii：在输入法的临时英文编辑区内输入字母、数字、符号、空格等，回车上屏后自动复位到中文
# commit_text  上屏拼出的词句，然后切换到英文
# commit_text：已输入的候选文字上屏并切换至英文输入模式
# commit_code  上屏原始的编码，然后切换到英文
# clear        清除输入的内容，然后切换到英文
# noop         屏蔽快捷键，啥也不干，但不要屏蔽 Caps

    switch_key:
      Shift_L: noop
      Shift_R: noop
      Control_L: noop
      Control_R: noop
      Caps_Lock: noop
      Eisu_toggle: clear

# accept: 实际接受的按键, minus、equal,、period、comma、bracketleft、bracketright
# send: 按键输出效果, Page_Up(向上翻页), Page_Down(向下翻页), Escape(清空输入码)
# when: 作用范围, paging(翻页), has_menu(操作候选项用), composing(操作输入码用), always(全域)
# toggle: 切换开关

# 快捷键
  key_binder/bindings:
  # 翻页
    - { accept: minus, send: Page_Up, when: paging }               # "-" 上一页
    - { accept: equal, send: Page_Down, when: has_menu }           # "=" 下一页
    - { accept: bracketleft, when: paging, send: Page_Up }         # "[" 上一页
    - { accept: bracketright, when: has_menu, send: Page_Down }    # "]" 下一页

  # 选词
    - { accept: semicolon, send: 2, when: has_menu}                  # ";" 选第2项候选项
    - { accept: apostrophe, send: 3, when: has_menu}                 # "'" 选第3项候选项
    - { accept: ISO_Left_Tab, send: Shift+Left, when: composing }    # 切换光标至下/上一个拼音
    - { accept: Shift+Tab, send: Shift+Left, when: composing }       # 
    - { accept: Tab, send: Shift+Right, when: composing }            # 

  # 移动
    - { accept: "Control+p", send: Up, when: composing }     # 
    - { accept: "Control+n", send: Down, when: composing }   # 
    - { accept: "Control+b", send: Left, when: composing }   # 移动光标
    - { accept: "Control+f", send: Right, when: composing }  # 向右选择候选词
    - { accept: "Control+a", send: Home, when: composing }   # 光标移至首
    - { accept: "Control+e", send: End, when: composing }    # 光标移至尾

  # 编辑
    - { accept: "Control+d", send: Delete, when: composing }            # 
    - { accept: "Control+k", send: "Shift+Delete", when: composing }    # 
    - { accept: "Control+h", send: BackSpace, when: composing }         # 删除输入码
    - { accept: "Control+g", send: Escape, when: composing }            # 清码
    - { accept: "Control+bracketleft", send: Escape, when: composing }  # 回车清码

  # 切换
    # - { accept: "Control+Shift+1", select: .next, when: always }             # 切换输入方案
    # - { accept: "Control+Shift+2", toggle: ascii_mode, when: always }        # 中/英文切换
    # - { accept: "Control+Shift+3", toggle: full_shape, when: always }        # 全角/半角切换
    # - { accept: "Control+Shift+4", toggle: simplification, when: always }    # 繁简体切换
    # - { accept: "Control+Shift+5", toggle: extended_charset, when: always }  # 通用/增广切换（显示生僻字）

    # - { accept: "Control+Shift+exclam", select: .next, when: always }
    # - { accept: "Control+Shift+at", toggle: ascii_mode, when: always }
    # - { accept: "Control+Shift+numbersign", toggle: full_shape, when: always }
    # - { accept: "Control+Shift+dollar", toggle: simplification, when: always }
    # - { accept: "Control+Shift+percent", toggle: extended_charset, when: always }

    # - { accept: "Shift+space", toggle: full_shape, when: always }
    # - { accept: "Control+period", toggle: ascii_punct, when: always }
